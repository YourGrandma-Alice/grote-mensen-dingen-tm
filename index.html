<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroteMensenDingenTM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #F5EBE8;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(128, 0, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(128, 0, 0, 0.02) 0%, transparent 50%),
                linear-gradient(45deg, rgba(128, 0, 0, 0.015) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(128, 0, 0, 0.015) 25%, transparent 25%);
            background-size: auto, auto, 50px 50px, 50px 50px;
            background-position: 0 0, 0 0, 0 0, 25px 25px;
            overflow: hidden;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img src="goodwishes.png" alt="GroteMensenDingenTM">
</body>
</html>
